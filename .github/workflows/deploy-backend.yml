name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy
        # RENDER_DEPLOY_HOOK_URL is set in GitHub repo secrets.
        # Get it from: Render Dashboard → your service → Settings → Deploy Hooks
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
